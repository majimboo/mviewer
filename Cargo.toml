[package]
name = "mviewer"
version = "0.1.0"
edition = "2024"

[dependencies]
anyhow = "1.0"
byteorder = "1.5"
clap = { version = "4.5", features = ["derive"] }
image = { version = "0.25", default-features = true, features = ["jpeg", "png"] }
myth-gltf-json = { version = "1.4.2", features = ["names", "KHR_lights_punctual"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
