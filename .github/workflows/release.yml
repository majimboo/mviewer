name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  actions: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Release build (${{ matrix.label }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux-x64
            archive_name: mviewer-${{ github.ref_name }}-linux-x64.tar.gz
            bin_name: mviewer
          - os: windows-latest
            label: windows-x64
            archive_name: mviewer-${{ github.ref_name }}-windows-x64.zip
            bin_name: mviewer.exe
          - os: macos-latest
            label: macos-arm64
            archive_name: mviewer-${{ github.ref_name }}-macos-arm64.tar.gz
            bin_name: mviewer
          - os: macos-15-intel
            label: macos-x64
            archive_name: mviewer-${{ github.ref_name }}-macos-x64.tar.gz
            bin_name: mviewer
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libjavascriptcoregtk-4.1-dev \
            libglib2.0-dev \
            libgdk-pixbuf-2.0-dev \
            libxdo-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release

      - name: Prepare package directory
        shell: bash
        run: |
          mkdir -p dist/mviewer
          cp README.md dist/mviewer/README.md
          cp LICENSE 2>/dev/null dist/mviewer/LICENSE || true
          cp target/release/${{ matrix.bin_name }} dist/mviewer/${{ matrix.bin_name }}
          mkdir -p dist/mviewer/icons
          cp target/generated-icons/mviewer-256.png dist/mviewer/icons/mviewer.png

      - name: Add Linux desktop launcher
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist/mviewer/share/applications
          cp packaging/linux/mviewer.desktop dist/mviewer/share/applications/mviewer.desktop

      - name: Build macOS app bundle
        if: runner.os == 'macOS'
        shell: bash
        run: |
          APP_DIR="dist/mviewer/mviewer.app"
          mkdir -p "$APP_DIR/Contents/MacOS" "$APP_DIR/Contents/Resources"
          cp target/release/mviewer "$APP_DIR/Contents/MacOS/mviewer"
          chmod +x "$APP_DIR/Contents/MacOS/mviewer"
          cat > "$APP_DIR/Contents/Info.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleDevelopmentRegion</key>
            <string>English</string>
            <key>CFBundleExecutable</key>
            <string>mviewer</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>CFBundleIdentifier</key>
            <string>io.github.majimboo.mviewer</string>
            <key>CFBundleInfoDictionaryVersion</key>
            <string>6.0</string>
            <key>CFBundleName</key>
            <string>mviewer</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>CFBundleVersion</key>
            <string>${{ github.run_number }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
          </dict>
          </plist>
          mkdir -p icon.iconset
          for size in 16 32 64 128 256 512; do
            cp "target/generated-icons/mviewer-${size}.png" "icon.iconset/icon_${size}x${size}.png"
            cp "target/generated-icons/mviewer-$((size * 2)).png" "icon.iconset/icon_${size}x${size}@2x.png"
          done
          iconutil -c icns icon.iconset -o "$APP_DIR/Contents/Resources/AppIcon.icns"
          rm -rf icon.iconset

      - name: Archive release bundle (tar.gz)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar -czf dist/${{ matrix.archive_name }} -C dist mviewer

      - name: Archive release bundle (zip)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Compress-Archive -Path dist\mviewer -DestinationPath dist\${{ matrix.archive_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.label }}
          path: dist/${{ matrix.archive_name }}

  publish:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Download artifacts with GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p release-artifacts
          gh run download ${{ github.run_id }} --dir release-artifacts

      - name: Publish release assets with GitHub CLI
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if ! gh release view "${{ github.ref_name }}" >/dev/null 2>&1; then
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          fi
          gh release edit "${{ github.ref_name }}" --draft=false
          find release-artifacts -type f -print0 | xargs -0 gh release upload "${{ github.ref_name }}" --clobber
