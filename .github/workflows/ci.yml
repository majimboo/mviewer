name: CI

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

  verify-export:
    name: Verify sample export
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Export vivfox sample
        run: cargo run --release -- test_data/vivfox.mview test_output/vivfox

      - name: Check expected outputs
        run: |
          test -f test_output/vivfox/vivfox.gltf
          test -f test_output/vivfox/vivfox.bin
          test -f test_output/vivfox/viewer.html
          test -f test_output/vivfox/mviewer.runtime.json
